<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cân bàn đứng</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <a href="index.html">TRANG CHỦ</a>
</div>

<div class="container">
<h2>Cân bàn đứng</h2>
<div class="grid" id="list"></div>
</div>

<script>
fetch("products.json")
.then(r=>r.json())
.then(data=>{
  let html="";
  data.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <a href="product.html?id=${p.id}" class="btn">Chi tiết</a>
    </div>`;
  });
  document.getElementById("list").innerHTML=html;
});
</script>

</body>
</html>
