<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chi tiết</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <img src="images/logo.png">
  <h1>QTN GLOBAL</h1>
</header>

<div id="detail"></div>

<script src="products.js"></script>

<script>
const slug = new URLSearchParams(window.location.search).get("slug");
const p = products.find(x => x.slug === slug);

let current = 0;

const html = `
<div class="detail">
  <div class="slider">
    <img id="mainImg" src="${p.images[0]}">
    <div class="thumbs">
      ${p.images.map((img,i)=>`
        <img src="${img}" onclick="changeImg(${i})">
      `).join("")}
    </div>
  </div>

  <div class="info">
    <h1>${p.name}</h1>
    <p>${p.desc}</p>

    <h3>Thông số:</h3>
    <ul>
      ${p.specs.map(s=>`<li>${s}</li>`).join("")}
    </ul>

    <a href="index.html" class="btn">Trang chủ</a>
  </div>
</div>
`;

document.getElementById("detail").innerHTML = html;

function changeImg(i){
  document.getElementById("mainImg").src = p.images[i];
}
</script>

</body>
</html>
