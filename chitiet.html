<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chi tiết</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <img src="images/logo.png" class="logo">
</header>

<div id="detail"></div>

<a class="zalo" href="https://zalo.me/0905913636" target="_blank">Zalo</a>

<script src="products.js"></script>

<script>
const slug = new URLSearchParams(location.search).get("slug");
const p = products.find(x => x.slug === slug);

document.getElementById("detail").innerHTML = `
<div class="detail">
  <div class="left">
    <img id="main" src="${p.images[0]}">
    <div class="thumbs">
      ${p.images.map(i => `<img src="${i}" onclick="document.getElementById('main').src='${i}'">`).join("")}
    </div>
  </div>

  <div class="right">
    <h1>${p.name}</h1>
    <p>${p.desc}</p>
    <ul>${p.specs.map(s=>`<li>${s}</li>`).join("")}</ul>
  </div>
</div>`;
</script>

</body>
</html>
