<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cân Điện Tử QTN GLOBAL</title>

<style>
body { font-family: Arial; margin: 0; background: #f1f5f9; text-align: center; }

header { background: #0f172a; color: white; padding: 20px; }

.product {
  background: white;
  padding: 20px;
  margin: 20px auto;
  border-radius: 10px;
  width: 300px;
}

.btn {
  padding: 10px 20px;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 8px;
}

.chat-buttons {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

.chat-buttons a {
  display: block;
  margin: 10px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  color: white;
  text-align: center;
  line-height: 50px;
}

.zalo { background: #0084ff; }
.messenger { background: #00b2ff; }
</style>
</head>

<body>

<header>
<img src="logo.jpg" width="80"><br>
<h2>Cân Điện Tử QTN GLOBAL</h2>
</header>

<div class="product">
  <h3>Cân điện tử thông minh</h3>
  <p>Giá: 299.000đ</p>
  <button class="btn">Mua ngay</button>
</div>

<!-- Nút chat -->
<div class="chat-buttons">
  <a href="https://zalo.me/0123456789" class="zalo">Z</a>
  <a href="https://m.me/yourfacebook" class="messenger">M</a>
</div>

</body>
</html>
