<!DOCTYPE html>
<html lang="vi">
<head>

<title>QTN GLOBAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header-fixed">
<div class="top-header">
<div class="container top-flex">
<img src="images/logo.png" class="logo">
<div class="top-info">
<div>📍 Hà Nội</div>
<div>📧 qtnglobal@gmail.com</div>
<div>📞 0383598603</div>
</div>
</div>
</div>

<div class="navbar">
<ul class="menu">
<li><a href="index.html">TRANG CHỦ</a></li>
<li class="has-dropdown">

<ul class="dropdown">

<div class="container">
<h2>Sản phẩm nổi bật</h2>
<div class="product-grid" id="home-products"></div>
</div>

<script>
fetch("products.json")
.then(res => res.json())
.then(data => {
let html="";
data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<a href="product.html?id=${p.id}" class="btn">Xem chi tiết</a>
</div>`;
});
document.getElementById("home-products").innerHTML=html;
});
</script>

</body>
</html>
