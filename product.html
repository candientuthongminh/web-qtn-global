<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chi tiết</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<div id="product-detail"></div>
</div>

<script>
const url=new URLSearchParams(window.location.search);
const id=url.get("id");

fetch("products.json")
.then(res=>res.json())
.then(data=>{
let p=data.find(x=>x.id===id);
if(!p){document.getElementById("product-detail").innerHTML="Không có sản phẩm";return;}

let html=`
<h1>${p.name}</h1>
<img src="${p.image}" style="width:300px">
<p>${p.price}</p>
<ul>${p.desc.map(d=>"<li>"+d+"</li>").join("")}</ul>
`;

document.getElementById("product-detail").innerHTML=html;
});
</script>

</body>
</html>
